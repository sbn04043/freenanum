<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    <script type="module" src="/js/registerScripts.js"></script>
    <style>
        .register-container {
            max-width: 500px;
            margin: 50px auto;
        }

        .btn-block {
            width: 100%;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .register-button {
            margin-top: 20px;
        }

        .login-link {
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="register-container">
    <h2 class="text-center">회원가입</h2>
    <form id="registerForm">
        <div class="form-group">
            <label for="username">사용자 이름 (아이디)</label>
            <input type="text" class="form-control" id="username" name="username" maxlength="40"
                   placeholder="아이디를 입력하세요" required>
        </div>
        <button type="button" class="btn btn-secondary mt-2" id="checkUsernameBtn">중복 체크</button>

        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="비밀번호를 입력하세요"
                   required>
        </div>

        <div class="form-group">
            <label for="name">이름</label>
            <input type="text" class="form-control" id="name" name="name" maxlength="40" placeholder="이름을 입력하세요"
                   required>
        </div>

        <div class="form-group">
            <label for="nickname">닉네임</label>
            <input type="text" class="form-control" id="nickname" name="nickname" placeholder="닉네임을 입력하세요" required>
        </div>

        <div class="form-group">
            <label for="phone">전화번호</label>
            <input type="text" class="form-control" id="phone" name="phone" maxlength="40" placeholder="전화번호를 입력하세요">
        </div>

        <div class="form-group">
            <label for="profileImage">프로필 이미지</label>
            <input type="file" class="form-control" id="profileImage" name="profileImage" accept="image/*">
        </div>

        <div class="form-group">
            <label for="locationInput">주소</label>
            <input type="text" class="form-control" id="locationInput" name="userAddress" placeholder="주소를 입력하세요"
                   oninput="getLocationList()">
        </div>
        <div class="list-group" id="locationResult"
             style="display: none; position: absolute; z-index: 1000; background: white; max-height: 200px; overflow-y: auto; border: 1px solid #ccc; border-radius: 5px;"></div>

        <div class="form-group">
            <label for="gender">성별</label>
            <select class="form-control" id="gender" name="gender">
                <option value="남성">남성</option>
                <option value="여성">여성</option>
                <option value="기타">기타</option>
            </select>
        </div>

        <div class="register-button">
            <input type="submit" id="registerBtn" class="btn btn-primary btn-block" value="회원가입">
        </div>
    </form>
</div>
<!-- Footer-->
<div th:replace="~{/fragment/footer :: footer}"></div>
<!-- Bootstrap core JS-->
</body>
</html>
